<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Skip Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 24px;
      background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .settings {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .setting-item:last-child {
      border-bottom: none;
    }

    .setting-label {
      font-size: 14px;
      font-weight: 500;
    }

    .setting-description {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.2);
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .stats {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stats-value {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stats-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: #666;
    }

    .footer a {
      color: #00ff88;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h1>Smart Skip</h1>
    <div class="subtitle">AI-Powered Sponsor Detection</div>
  </div>

  <div class="settings">
    <div class="setting-item">
      <div>
        <div class="setting-label">Auto-Skip</div>
        <div class="setting-description">Automatically skip sponsor segments</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="autoSkip" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting-item">
      <div>
        <div class="setting-label">Skip Notifications</div>
        <div class="setting-description">Show notifications when skipping</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="notifications" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="stats">
    <div class="stats-value" id="timeSaved">0</div>
    <div class="stats-label">Minutes of sponsors skipped</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
